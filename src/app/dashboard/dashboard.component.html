<div class="main-content">
  <!-- <div class="preview-toggle" style="display:flex; justify-content:flex-end; margin-bottom: 8px;">
    <button pButton type="button" (click)="openPreview()" label="Preview / Print"></button>
  </div> -->
  <div class="cards-p">
    <p-card header="PORT - PHYSICAL">
      <table>
        <!-- <tr class="initial-tr">
          <td>LASER Status</td>
          <td class="initial-tr">
          </td>
        </tr> -->
        <tr class="initial-tr" *ngFor="let col of physicalColumns">
          <td>{{ col.header }}</td>
          <td>:</td>
          <td *ngIf="isNew">
            <p-skeleton width="5rem" styleClass="mb-2" />
          </td>
          <td *ngIf="!isNew">
            {{ physicalData[col.field] }}
          </td>
        </tr>
      </table>
    </p-card>
  </div>
  <div class="cards-p">
    <p-card header="FLOW CONTROL & LOGIN">
      <table>
        <tr class="initial-tr" *ngFor="let col of wwnColumns">
          <td>{{ col.header }}</td>
          <td>:</td>
          <td *ngIf="isNew">
            <p-skeleton width="5rem" styleClass="mb-2" />
          </td>
          <td *ngIf="!isNew">{{ wwnData[col.field] }}</td>
        </tr>
      </table>
    </p-card>
  </div>
  <div class="cards-p">
    <p-card header="FC BERT Configuration">
      <table>
        <tr class="initial-tr" *ngFor="let col of deviceConfigColumns">
          <td>{{ col.header }}</td>
          <td>:</td>
          <td *ngIf="isNew">
            <p-skeleton width="5rem" styleClass="mb-2" />
          </td>
          <td *ngIf="!isNew">{{ deviceConfigData[col.field] }}</td>
        </tr>
        <tr class="initial-tr">
          <td>PORT PHYSICAL</td>
          <td>:</td>
          <td *ngIf="isNew">
            <p-skeleton width="5rem" styleClass="mb-2" />
          </td>
          <td *ngIf="!isNew">{{ pspLink }}</td>
      </table>
    </p-card>
  </div>
</div>
