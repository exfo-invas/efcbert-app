<div class="landing-page">
  <p-megaMenu [model]="items" [style]="{ display: 'flex' }" styleClass="p-4 bg-surface-0 dark:bg-surface-900">
    <ng-template #start>
      <img ngSrc="assets/logo/Title-removebg.png" alt="EFCBert Logo" class="logo" height="200" width="500">
    </ng-template>
    <ng-template let-item>
      <a *ngIf="item.root" pRipple
        class="flex items-center cursor-pointer px-4 py-2 overflow-hidden relative font-semibold text-lg uppercase"
        style="border-radius: 2rem">
        <i [ngClass]="item.icon"></i>
        <span class="ml-2">{{ item.label }}</span>
      </a>
    </ng-template>
    <ng-template #end>
      <app-server-status [connStatus]="connStatus" (loginSuccess)="logingResponse($event)" (loginFailed)="openLoginDialog($event)"/>
    </ng-template>
  </p-megaMenu>

  <div class="main-content">
    <div class="content">
      <router-outlet></router-outlet>
    </div>

    <div class="side-nav">
      <div class="time-box">
        <app-timer *ngIf="health" [eventStart]="trimerEvent"></app-timer>
      </div>
      <div class="nav-buttons">
        <p-button *ngIf="health && !suiteConn" label="Connect to test suite" (onClick)="openLoginDialog(true)"></p-button>
        <p-button *ngIf="!health && maxTimeout" label="Restart server" styleClass="p-button-danger" (onClick)="restart()" />
        <p-tag *ngIf="!health" icon="pi pi-exclamation-triangle" severity="warn" [value]="counting()" />
        <p-progress-spinner *ngIf="serverLoading" strokeWidth="8" fill="transparent" animationDuration=".5s" [style]="{ width: '50px', height: '50px' }" />
        <app-login-page [visible]="openLogin" (loginSuccess)="logingResponse($event)"
          (loginFailed)="openLoginDialog($event)"></app-login-page>
        <p-button *ngIf="suiteConn" [disabled]="testStarted" [loading]="isLoading" label="Start" icon="pi pi-forward"
          iconPos="left" (onClick)="startEvent()"></p-button>
        <p-button *ngIf="suiteConn" [disabled]="!suiteConn || !testStarted" [loading]="isLoading" label="Stop"
          icon="pi pi-stop" iconPos="left" (onClick)="stopEvent()" styleClass="p-button-danger"></p-button>
        <p-button *ngIf="health && suiteConn" type="button" (click)="print()" label="Preview / Print"></p-button>
      </div>
  </div>
</div>
